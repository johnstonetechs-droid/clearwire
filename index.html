<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>ClearWire — Infrastructure Damage Intelligence</title>
    <meta name="description" content="ClearWire connects field reporters, contractors, service providers, and communities on a single real-time platform for utility damage and outage intelligence. One platform. Every stakeholder. Closed loop." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://clearwire.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clearwire.app/" />
    <meta property="og:title" content="ClearWire — Infrastructure Damage Intelligence" />
    <meta property="og:description" content="Field reporters document damage. Contractors receive repair leads. Service providers get intelligence their own monitoring can't produce. One platform. Every stakeholder. Closed loop." />
    <meta property="og:site_name" content="ClearWire" />
    <meta property="og:image" content="https://clearwire.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ClearWireApp" />
    <meta name="twitter:title" content="ClearWire — Infrastructure Damage Intelligence" />
    <meta name="twitter:description" content="One platform. Every stakeholder. Closed loop. Field damage reporting, live disruption maps, SMS notifications, and contractor pipeline." />
    <meta name="twitter:image" content="https://clearwire.app/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Structured data: SoftwareApplication + Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "ClearWire",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web, Android, iOS",
          "url": "https://clearwire.app/",
          "description": "Real-time platform connecting field reporters, contractors, service providers, and communities for utility damage and outage intelligence.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "publisher": { "@id": "https://clearwire.app/#org" }
        },
        {
          "@type": "Organization",
          "@id": "https://clearwire.app/#org",
          "name": "ClearWire",
          "url": "https://clearwire.app/"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
